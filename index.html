<!-- 여의도 점심 메뉴 추천 + 돌림판 · 키움캐피탈 · 토스 스타일 -->
<style>
  :root {
    --bg: #f2f4f6;
    --card: #ffffff;
    --ink: #191f28;
    --ink-2: #4e5968;
    --muted: #8b95a1;
    --line: #e5e8eb;
    --fill: #f2f4f6;
    --fill-2: #f9fafb;
    --kiwoom: #e6007e;
    --kiwoom-dark: #c10069;
    --kiwoom-soft: #fde6f2;
    --blue: #3182f6;
    --blue-soft: #e8f3ff;
    --gold: #ffb020;
    --green: #2ac769;
    --radius: 20px;
    --radius-sm: 14px;
    --sans: "Toss Product Sans", "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  .lunch-app { font-family: var(--sans); color: var(--ink); background: var(--bg); min-height: 100vh; padding: 20px 16px 64px; max-width: 760px; margin: 0 auto; line-height: 1.45; -webkit-font-smoothing: antialiased; }
  .lunch-app h1,.lunch-app h2,.lunch-app h3 { margin: 0; font-weight: 700; letter-spacing: -.03em; }

  /* header */
  .brand { display: flex; align-items: center; gap: 10px; padding: 6px 2px 18px; }
  .brand img { height: 26px; width: auto; display: block; }
  .brand .div { width: 1px; height: 18px; background: var(--line); }
  .brand .role { font-size: 13px; color: var(--muted); font-weight: 600; }

  .hero { padding: 4px 4px 22px; }
  .hero .kick { font-size: 14px; font-weight: 700; color: var(--kiwoom); margin-bottom: 8px; }
  .hero h1 { font-size: 28px; line-height: 1.25; }
  .hero p { color: var(--ink-2); margin: 10px 0 0; font-size: 15px; }

  .card { background: var(--card); border-radius: var(--radius); padding: 22px 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .card h2 { font-size: 18px; margin-bottom: 4px; }
  .card .sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-2); margin: 0 0 8px; }
  .field { margin-bottom: 16px; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  input, select { width: 100%; background: var(--fill); border: 1.5px solid transparent; color: var(--ink); border-radius: var(--radius-sm); padding: 14px 14px; font-size: 16px; font-family: var(--sans); font-weight: 500; transition: border-color .15s, background .15s; }
  input::placeholder { color: var(--muted); font-weight: 500; }
  input:focus, select:focus { outline: none; background: #fff; border-color: var(--kiwoom); }
  select { appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238b95a1' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 16px center; padding-right: 38px; }

  .btn { border: none; border-radius: var(--radius-sm); cursor: pointer; font-family: var(--sans); font-weight: 700; font-size: 16px; padding: 15px 18px; transition: transform .06s, background .15s, color .15s; width: 100%; }
  .btn:active { transform: scale(.985); }
  .btn-primary { background: var(--kiwoom); color: #fff; }
  .btn-primary:hover { background: var(--kiwoom-dark); }
  .btn-soft { background: var(--fill); color: var(--ink-2); font-size: 14px; padding: 13px; }
  .btn-soft:hover { background: #e9ecef; }

  .seg { display: flex; gap: 8px; }
  .seg button { flex: 1; background: var(--fill); border: 1.5px solid transparent; color: var(--ink-2); border-radius: var(--radius-sm); padding: 13px 4px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: var(--sans); transition: all .12s; }
  .seg button.on { background: var(--kiwoom-soft); color: var(--kiwoom-dark); border-color: var(--kiwoom); }

  .stars { display: flex; gap: 6px; }
  .stars span { font-size: 28px; cursor: pointer; color: var(--line); line-height: 1; transition: color .1s, transform .06s; }
  .stars span:active { transform: scale(1.2); }
  .stars span.on { color: var(--gold); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { font-size: 14px; font-weight: 600; padding: 9px 16px; border-radius: 999px; border: 1.5px solid var(--line); background: #fff; color: var(--ink-2); cursor: pointer; user-select: none; transition: all .12s; }
  .chip.on { background: var(--blue-soft); border-color: var(--blue); color: var(--blue); }

  .countpill { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--kiwoom-dark); background: var(--kiwoom-soft); padding: 6px 12px; border-radius: 999px; margin-bottom: 16px; }

  .filterbar { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  @media (max-width: 480px) { .filterbar { grid-template-columns: 1fr; } }

  .list { display: flex; flex-direction: column; gap: 10px; max-height: 460px; overflow-y: auto; margin: 0 -4px; padding: 0 4px; }
  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 40px 10px; background: var(--fill); border-radius: var(--radius-sm); }
  .item { background: var(--fill-2); border: 1.5px solid var(--line); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: opacity .15s; }
  .item.dimmed { opacity: .38; }
  .item .name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .item .meta { font-size: 12px; color: var(--muted); margin-top: 5px; display: flex; gap: 10px; flex-wrap: wrap; font-weight: 500; }
  .item .meta b { color: var(--ink-2); font-weight: 700; }
  .item .grow { flex: 1; min-width: 0; }
  .tag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 7px; background: var(--kiwoom-soft); color: var(--kiwoom-dark); }
  .del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; padding: 4px 6px; border-radius: 8px; line-height: 1; }
  .del:hover { color: var(--kiwoom); background: var(--kiwoom-soft); }

  /* wheel */
  .wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 22px; padding-top: 6px; }
  .wheel-stage { position: relative; width: 320px; height: 320px; max-width: 86vw; }
  .pointer { position: absolute; top: -2px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 26px solid var(--kiwoom); z-index: 3; filter: drop-shadow(0 3px 4px rgba(0,0,0,.18)); }
  #wheel { display: block; width: 320px; height: 320px; max-width: 86vw; border-radius: 50%; box-shadow: 0 8px 28px rgba(0,0,0,.10); transition: transform 4.6s cubic-bezier(.16,.7,.16,1); }
  .hub { position: absolute; top: 50%; left: 50%; width: 64px; height: 64px; transform: translate(-50%,-50%); border-radius: 50%; background: #fff; box-shadow: 0 2px 10px rgba(0,0,0,.14); display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 2; }
  .result { text-align: center; min-height: 56px; }
  .result .pick { font-size: 27px; font-weight: 800; color: var(--ink); letter-spacing: -.03em; }
  .result .pick.hl { color: var(--kiwoom); }
  .result .sub2 { font-size: 13px; color: var(--muted); margin-top: 6px; font-weight: 500; }
  .wheel-note { font-size: 12px; color: var(--muted); text-align: center; font-weight: 500; }
  .spin-btn { max-width: 280px; }

  .footer { text-align: center; font-size: 12px; color: var(--muted); padding-top: 8px; }
</style>

    ["무안회관","한식",12,"no",1,4,[]],
    ["골수","뼈해장국·한식",14,"no",1,4,["겨울"]],
    ["키보락앤롤","롤초밥·일식",8,"no",2,4,[]],
    ["무월","솥밥한상·한식",10,"yes",2,4,[]],
    ["라케이브","양식",8,"yes",3,4,[]],
    ["에이버리","양식·브런치",8,"yes",3,4,[]],
    ["올리페페","파스타·양식",8,"no",2,4,[]],
    ["콘타이","태국음식",8,"no",2,4,["여름"]],
    ["심퍼티쿠시","꼬치·일식",8,"no",1,4,[]],
    ["로스옥","김치찜·한식",12,"no",1,4,["겨울"]],
    ["파낙스","삼계탕·한식",16,"no",1,4,["여름"]]
  ];
  function buildDefaults(){ return DEFAULTS.map(d=>({id:'d-'+Math.random().toString(36).slice(2,9),name:d[0],cat:d[1],cap:d[2],reserve:d[3],talk:d[4],taste:d[5],seasons:d[6]})); }

  let restaurants=[], candidates=[], spinning=false, rotation=0;

  async function load(){ try{const r=await window.storage.get(KEY); restaurants=r&&r.value?JSON.parse(r.value):buildDefaults();}catch(e){restaurants=buildDefaults();} if(!restaurants.length)restaurants=buildDefaults(); await save(); render(); }
  async function save(){ try{await window.storage.set(KEY,JSON.stringify(restaurants));}catch(e){} }

  function segValue(id){const on=$('#'+id+' .on');return on?on.dataset.v:null;}
  $$('#f-reserve button, #f-talk button').forEach(b=>b.addEventListener('click',()=>{[...b.parentElement.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');}));
  const tasteEl=$('#f-taste');
  function paintStars(){$$('span',tasteEl).forEach((s,i)=>s.classList.toggle('on',i<+tasteEl.dataset.val));}
  $$('span',tasteEl).forEach((s,i)=>s.addEventListener('click',()=>{tasteEl.dataset.val=i+1;paintStars();}));
  paintStars();
  $$('#f-season .chip').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));

  $('#add-btn').addEventListener('click',()=>{
    const name=$('#f-name').value.trim(); if(!name){$('#f-name').focus();return;}
    restaurants.unshift({id:'u-'+Date.now(),name,cat:$('#f-cat').value.trim()||'기타',cap:parseInt($('#f-cap').value)||0,reserve:segValue('f-reserve'),talk:parseInt(segValue('f-talk')),taste:parseInt(tasteEl.dataset.val),seasons:$$('#f-season .chip.on').map(c=>c.dataset.v)});
    save();render(); $('#f-name').value='';$('#f-cat').value='';$('#f-cap').value=''; $$('#f-season .chip.on').forEach(c=>c.classList.remove('on')); $('#f-name').focus();
  });
  $('#reset-btn').addEventListener('click',()=>{restaurants=buildDefaults();save();render();});
  $('#clear-btn').addEventListener('click',()=>{restaurants=[];save();render();});

  function currentSeason(){const m=new Date().getMonth()+1;if(m>=3&&m<=5)return'봄';if(m>=6&&m<=8)return'여름';if(m>=9&&m<=11)return'가을';return'겨울';}
  function filterList(){
    const people=parseInt($('#q-people').value)||0,nr=$('#q-reserve').value,mt=parseInt($('#q-talk').value)||0,mta=parseInt($('#q-taste').value)||0,cq=$('#q-cat').value.trim();
    let season=$('#q-season').value;if(season==='auto')season=currentSeason();
    return restaurants.filter(r=>{
      if(people&&r.cap&&r.cap<people)return false;
      if(nr==='yes'&&r.reserve!=='yes')return false;
      if(mt&&r.talk<mt)return false;
      if(mta&&r.taste<mta)return false;
      if(cq&&!(r.cat+r.name).includes(cq))return false;
      if(season&&r.seasons.length&&!r.seasons.includes(season))return false;
      return true;
    });
  }
  const TALK={3:'상·조용',2:'중',1:'하·시끌'};
  function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  function render(){
    candidates=filterList(); const pass=new Set(candidates.map(r=>r.id));
    $('#count').textContent = restaurants.length?`통과 ${candidates.length}곳 · 전체 ${restaurants.length}곳`:'전체 0곳';
    const list=$('#list');
    if(!restaurants.length){list.innerHTML='<div class="empty">등록된 식당이 없어요.<br>“기본 목록 불러오기”를 누르거나 직접 추가하세요.</div>';drawWheel();return;}
    list.innerHTML='';
    restaurants.forEach(r=>{
      const el=document.createElement('div');el.className='item'+(pass.has(r.id)?'':' dimmed');
      el.innerHTML=`<div class="grow"><div class="name">${esc(r.name)} <span class="tag">${esc(r.cat)}</span></div><div class="meta"><span>👥 <b>${r.cap||'–'}</b>석</span><span>${r.reserve==='yes'?'📞 예약가능':'🚶 예약불가'}</span><span>🔊 <b>${TALK[r.talk]}</b></span><span>😋 ${'★'.repeat(r.taste)}</span><span>🗓 ${r.seasons.length?r.seasons.join('·'):'사계절'}</span></div></div><button class="del" title="삭제">✕</button>`;
      el.querySelector('.del').addEventListener('click',()=>{restaurants=restaurants.filter(x=>x.id!==r.id);save();render();});
      list.appendChild(el);
    });
    drawWheel();
  }
  ['q-people','q-reserve','q-talk','q-taste','q-season','q-cat'].forEach(id=>$('#'+id).addEventListener('input',render));

  const canvas=$('#wheel'),ctx=canvas.getContext('2d');
  const COLORS=['#e6007e','#3182f6','#ffb020','#2ac769','#9b59b6','#c10069','#ff7043','#26c6da'];
  let wheelSet=[];
  function pickWheelSet(){let a=candidates.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,14);}
  function drawWheel(){
    wheelSet=pickWheelSet();const items=wheelSet,cx=160,cy=160,R=158;ctx.clearRect(0,0,320,320);
    if(!items.length){ctx.fillStyle='#f2f4f6';ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.fill();ctx.fillStyle='#8b95a1';ctx.font='600 14px sans-serif';ctx.textAlign='center';ctx.fillText('후보가 없어요',cx,cy-6);ctx.fillText('조건을 완화해보세요',cx,cy+14);return;}
    const seg=(Math.PI*2)/items.length;
    items.forEach((it,i)=>{
      const a0=i*seg,a1=a0+seg;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,a0,a1);ctx.closePath();ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a0+seg/2);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='700 13px sans-serif';let nm=it.name;if(nm.length>8)nm=nm.slice(0,7)+'…';ctx.fillText(nm,R-14,4);ctx.restore();
    });
    canvas.style.transition='none';canvas.style.transform='rotate(0deg)';rotation=0;void canvas.offsetWidth;canvas.style.transition='';
  }

  $('#spin-btn').addEventListener('click',()=>{
    if(spinning)return;
    if(!wheelSet.length){flash('후보가 없어요');return;}
    if(wheelSet.length===1){showResult(wheelSet[0]);return;}
    spinning=true;
    const seg=360/wheelSet.length,winner=Math.floor(Math.random()*wheelSet.length);
    rotation=360*6+(270-(winner*seg+seg/2));
    canvas.style.transition='transform 4.6s cubic-bezier(.16,.7,.16,1)';canvas.style.transform=`rotate(${rotation}deg)`;
    setTimeout(()=>{spinning=false;showResult(wheelSet[winner]);},4700);
  });
  function showResult(r){$('#result').innerHTML=`<div class="pick hl">${esc(r.name)} 🎉</div><div class="sub2">${esc(r.cat)} · 😋 ${'★'.repeat(r.taste)} · 🔊 ${TALK[r.talk]} · ${r.reserve==='yes'?'예약가능':'예약불가'} · 👥 ${r.cap||'–'}석</div>`;}
  function flash(m){$('#result').innerHTML=`<div class="pick">${m}</div><div class="sub2">조건을 완화하거나 식당을 등록해보세요</div>`;}

  load();
})();
</script>
